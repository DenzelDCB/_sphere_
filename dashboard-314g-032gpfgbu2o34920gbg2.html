<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_sphere_ // gateway</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0c0c0e;
            --accent-color: #00f0ff;
            --accent-dim: #00a8b5;
            --text-color: #e0e0e0;
            --border-color: #1a1a22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Cyberpunk Grid Background Effect */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-color);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #000;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="password"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .fallback-link {
            display: block;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }

        .fallback-link:hover {
            color: var(--accent-dim);
        }

        .error-msg {
            color: #ff3333;
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>_sphere_</h1>
        <p>ACCESS // RESTRICTED</p>
        
        <div class="input-group">
            <input type="password" id="passKey" placeholder="ENTER ACCESS KEY" autocomplete="off" autofocus>
            <div id="error" class="error-msg">INVALID KEY. ACCESS DENIED.</div>
        </div>
        
        <button onclick="verifyAccess()">INITIALIZE</button>
        
        <a href="index.html" class="fallback-link">> ABORT_SEQUENCE (RETURN HOME)</a>
    </div>

    <script>
        // Trigger verification when pressing "Enter" inside the input box
        document.getElementById('passKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyAccess();
            }
        });

        function verifyAccess() {
            var input = document.getElementById("passKey").value;
            var errorDiv = document.getElementById("error");
            
            // Replace 'YourSecretPassword' with your preferred key
            if (input === "YourSecretPassword") {
                errorDiv.style.display = "none";
                window.location.href = "saved_resource.html";
            } else {
                errorDiv.style.display = "block";
                
                // Pause for 1.5 seconds so the user can see the error, then redirect home
                setTimeout(function() {
                    window.location.href = "index.html";
                }, 1500);
            }
        }
    </script>
</body>
</html>
