<!DOCTYPE html>
<html>
<head>
    <title>Protected Redirect</title>
    <script>
        function checkPassword() {
            // Replace 'YourSecretPassword' with your actual password
            var password = prompt("Please enter the password to proceed:");
            
            if (password === "YourSecretPassword") {
                // If correct, redirect to the secure page
                window.location.href = "saved_resource.html";
            } else {
                // If incorrect or canceled, send to index.html
                alert("Incorrect password. Redirecting to home page.");
                window.location.href = "index.html";
            }
        }
    </script>
</head>
<body onload="checkPassword()">
    <p>This page is password protected. If nothing happens, <a href="index.html">click here to return home</a>.</p>
</body>
</html>
