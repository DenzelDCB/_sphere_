<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX SCHOLARS - LOG IN</title>
    <style>
        :root {
            --bg-color: #111111;
            --text-color: #ffffff;
            --muted-color: #666666;
            --border-color: #333333;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            max-width: 320px;
            padding: 20px;
            text-align: left;
        }

        header {
            margin-bottom: 30px;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted-color);
            text-transform: lowercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            font-size: 0.95rem;
            outline: none;
            border-radius: 0;
            transition: border-color 0.2s ease;
        }

        input[type="password"]:focus {
            border-bottom-color: var(--text-color);
        }

        input[type="password"]::placeholder {
            color: #444444;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            font-family: var(--font-stack);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            border-color: var(--text-color);
            background-color: #1a1a1a;
        }

        .cancel-link {
            font-size: 0.85rem;
            color: var(--muted-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .cancel-link:hover {
            color: var(--text-color);
            border-bottom-color: var(--text-color);
        }

        .status-msg {
            font-size: 0.8rem;
            color: #ff4444;
            margin-top: 15px;
            min-height: 1.2em;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="title">_sphere_</div>
            <div class="subtitle">restricted directory access</div>
        </header>
        
        <div class="form-group">
            <input type="password" id="passKey" placeholder="Enter security token..." autocomplete="off" autofocus>
            <div id="error" class="status-msg">INVALID KEY. ACCESS DENIED.</div>
        </div>
        
        <div class="actions">
            <a href="index.html" class="cancel-link">cancel</a>
            <button onclick="verifyAccess()">submit</button>
        </div>
    </div>

    <script>
        // Triple Base64 Encode System
        const TRIPLE_ENCODED_TARGET = 'V2tkV2FtSXlVbkJpYldSMlkwRTlQUT09';

        // Trigger verification when pressing "Enter" inside the input box
        document.getElementById('passKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyAccess();
            }
        });

        // Function to encode a string 3 times
        function encodeTripleBase64(str) {
            var step1 = btoa(str);
            var step2 = btoa(step1);
            var step3 = btoa(step2);
            return step3;
        }

        function verifyAccess() {
            var input = document.getElementById("passKey").value;
            var errorDiv = document.getElementById("error");
            
            // Encode the user input 3 times
            var hashedInput = encodeTripleBase64(input);
            
            // Compare encoded input with the pre-defined encoded password
            if (hashedInput === TRIPLE_ENCODED_TARGET) {
                errorDiv.style.visibility = "hidden";
                window.location.href = "saved_resource.html";
            } else {
                errorDiv.style.visibility = "visible";
                
                // Pause for 1.5 seconds so the user can see the error, then redirect home
                setTimeout(function() {
                    window.location.href = "index.html";
                }, 1500);
            }
        }
    </script>
</body>
</html>
